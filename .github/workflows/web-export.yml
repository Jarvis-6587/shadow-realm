name: Godot Web Export & GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  export-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export Godot Web
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          cache: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add coi-serviceworker for SharedArrayBuffer support
        run: |
          curl -Lo build/web/coi-serviceworker.min.js https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.min.js
          sed -i 's|<head>|<head><script src="coi-serviceworker.min.js"></script>|' build/web/index.html

      - name: Patch canvas CSS for fullscreen
        run: |
          python3 - <<'EOF'
          import re

          with open('build/web/index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          # Patch nur den #canvas CSS-Block (gezielt, nicht html/body).
          # Godot behandelt das Seitenverhaeltnis intern via stretch/mode=viewport + aspect=keep,
          # daher ist object-fit:contain nicht noetig und kann mit canvasResizePolicy:2 kollidieren.
          # 100vw/100vh statt 100% fuer berechenbare Viewport-Aufloesung in Flex-Containern.
          def patch_canvas_block(css_block):
              css_block = re.sub(r'\n(\t| {2,})object-fit: contain;', '', css_block)
              css_block = re.sub(r'(\t| {2,})width: 100%;', r'\1width: 100vw;', css_block)
              css_block = re.sub(r'(\t| {2,})height: 100%;', r'\1height: 100vh;', css_block)
              return css_block

          # Ersetze nur innerhalb des #canvas { ... } Blocks
          content = re.sub(
              r'(#canvas \{[^}]*\})',
              lambda m: patch_canvas_block(m.group(0)),
              content,
              flags=re.DOTALL
          )

          with open('build/web/index.html', 'w', encoding='utf-8') as f:
              f.write(content)

          print('Canvas CSS erfolgreich gepatcht.')
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true
