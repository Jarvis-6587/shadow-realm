name: Godot Web Export & GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  export-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export Godot Web
        uses: firebelley/godot-export@v6.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          cache: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add coi-serviceworker for SharedArrayBuffer support
        run: |
          curl -Lo build/web/coi-serviceworker.min.js https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.min.js
          sed -i 's|<head>|<head><script src="coi-serviceworker.min.js"></script>|' build/web/index.html

      - name: Patch canvas CSS for aspect-ratio-correct display
        run: |
          python3 - <<'EOF'
          import re

          with open('build/web/index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          # Replace the default Godot #canvas rule with aspect-ratio-aware sizing.
          # width: 100vw + height: 100vh ignores the 4:3 game ratio and causes distortion.
          # min(100vw, 100vh*4/3) x min(100vh, 100vw*3/4) maintains 4:3 on any screen.
          correct_canvas_rule = (
              '#canvas {\n'
              '\tdisplay: block;\n'
              '\tmargin: 0 auto;\n'
              '\twidth: min(100vw, calc(100vh * 4 / 3));\n'
              '\theight: min(100vh, calc(100vw * 3 / 4));\n'
              '}'
          )
          content = re.sub(
              r'#canvas \{[^}]*\}',
              correct_canvas_rule,
              content,
              flags=re.DOTALL
          )

          with open('build/web/index.html', 'w', encoding='utf-8') as f:
              f.write(content)

          print('Canvas CSS patched: aspect-ratio-aware sizing applied.')
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true
